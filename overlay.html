<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>CrazyAnkit.AI — AI Interview Companion</title>
  <!-- Load Outfit & Plus Jakarta Sans Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Marked Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg-primary: rgba(6, 4, 14, 0.94);
      --bg-secondary: rgba(11, 8, 28, 0.95);
      --bg-elevated: rgba(20, 14, 48, 0.74);
      --accent-violet: #a855f7;
      --accent-violet-glow: rgba(168, 85, 247, 0.24);
      --accent-teal: #06b6d4;
      --accent-teal-glow: rgba(6, 182, 212, 0.15);
      --accent-amber: #f97316;
      --accent-amber-glow: rgba(249, 115, 22, 0.20);
      --accent-red: #fb7185;
      --accent-emerald: #4ade80;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #3d2d6e;
      --border-color: rgba(255, 255, 255, 0.06);
      --border-glow: rgba(168, 85, 247, 0.22);
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-body);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      padding: 6px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Floating Draggable App Frame */
    .overlay-frame {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(168, 85, 247, 0.16);
      border-radius: 16px;
      box-shadow:
        0 28px 64px rgba(0, 0, 0, 0.80),
        0 0 0 1px var(--border-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Drag Handle Bar */
    .drag-handle-bar {
      height: 38px;
      background: rgba(255, 255, 255, 0.01);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      -webkit-app-region: drag;
      cursor: grab;
      flex-shrink: 0;
    }

    .drag-handle-bar:active {
      cursor: grabbing;
    }

    .drag-title {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 40%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
      filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.50));
    }

    /* Connection status */
    .status-dot-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      -webkit-app-region: no-drag;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--text-muted);
      border-radius: 50%;
      transition: var(--transition);
    }

    .status-dot.active {
      background-color: var(--accent-emerald);
      box-shadow: 0 0 10px var(--accent-emerald), 0 0 20px rgba(74, 222, 128, 0.3);
    }

    .status-dot.live-recording {
      background-color: var(--accent-red);
      box-shadow: 0 0 10px var(--accent-red), 0 0 20px rgba(251, 113, 133, 0.3);
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-red {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }

    /* Configuration Panel with Tabs */
    .setup-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      background: rgba(14, 16, 27, 0.3);
    }

    .tabs-bar {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.2);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }

    .tab-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.02);
    }

    .tab-btn.active {
      color: var(--accent-violet);
      border-bottom-color: var(--accent-violet);
      background: rgba(168, 85, 247, 0.08);
    }

    .tabs-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tab-pane {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .tab-pane.active {
      display: flex;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-field {
      width: 100%;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-family: var(--font-body);
      font-size: 12.5px;
      outline: none;
      transition: var(--transition);
    }

    .input-field:focus {
      border-color: rgba(168, 85, 247, 0.45);
      background: rgba(168, 85, 247, 0.06);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.10);
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap select {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-family: var(--font-body);
      font-size: 12.5px;
      outline: none;
      cursor: pointer;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-55%);
      color: var(--text-secondary);
      pointer-events: none;
      font-size: 11px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px 0;
    }

    .checkbox-row input {
      cursor: pointer;
      accent-color: var(--accent-violet);
    }

    .btn {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: white;
      font-family: var(--font-display);
      font-weight: 700;
      cursor: pointer;
      font-size: 12.5px;
      box-shadow: 0 4px 14px rgba(168, 85, 247, 0.30);
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.50);
      filter: brightness(1.10);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Live Panel Mode */
    .app-overlay-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      pointer-events: all;
    }

    /* Session controller header */
    .session-header {
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .back-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
    }

    .back-btn:hover {
      color: #fff;
    }

    .session-timer {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--accent-teal);
      background: var(--accent-teal-glow);
      padding: 2px 10px;
      border-radius: 6px;
      border: 1px solid rgba(6, 182, 212, 0.22);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.12);
    }

    /* Transcript bubbles scrolling container */
    .transcripts-area {
      height: 80px;
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.25);
    }

    /* Custom scrollbars */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-violet);
    }

    /* Result answers area */
    .ai-result-area {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-section-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent-amber);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 5px;
      text-shadow: 0 0 12px rgba(249, 115, 22, 0.45);
    }

    .answer-text {
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--text-primary);
    }

    /* Markdown styling inside answers */
    .answer-text p {
      margin-bottom: 8px;
    }

    .answer-text ul,
    .answer-text ol {
      padding-left: 16px;
      margin-bottom: 8px;
    }

    .answer-text li {
      margin-bottom: 4px;
    }

    .answer-text code {
      background: rgba(6, 182, 212, 0.08);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.9em;
      color: var(--accent-teal);
      border: 1px solid rgba(6, 182, 212, 0.14);
    }

    .answer-text pre {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(168, 85, 247, 0.16);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .answer-text pre code {
      background: transparent;
      padding: 0;
      color: #4ade80;
      font-size: 11px;
      border: none;
    }

    /* Copy Button */
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
    }

    .copy-btn:hover {
      background: rgba(168, 85, 247, 0.18);
      border-color: var(--accent-violet);
      color: #fff;
    }

    /* Pagination container */
    .response-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 6px 12px;
      border-top: 1px solid var(--border-color);
      background: rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
    }

    .pag-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      outline: none;
    }

    .pag-btn:hover:not(:disabled) {
      color: #fff;
      background: rgba(168, 85, 247, 0.18);
      border-color: var(--accent-violet);
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.28);
    }

    .pag-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .pag-indicator {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Bottom capturing inputs area */
    .bottom-bar {
      padding: 12px;
      background: rgba(0, 0, 0, 0.25);
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .capture-row {
      display: flex;
      gap: 6px;
    }

    .audio-btn {
      flex: 2;
      padding: 8px;
      font-size: 11.5px;
      font-weight: 700;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .audio-btn.idle {
      background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(168, 85, 247, 0.32);
    }

    .audio-btn.active-record {
      background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%);
      color: #fff;
      box-shadow: 0 0 14px rgba(251, 113, 133, 0.55);
    }

    .speaker-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: var(--transition);
    }

    .speaker-btn.candidate {
      border-color: rgba(168, 85, 247, 0.38);
      color: var(--accent-violet);
      background: rgba(168, 85, 247, 0.07);
    }

    .speaker-btn.interviewer {
      border-color: rgba(6, 182, 212, 0.38);
      color: var(--accent-teal);
      background: rgba(6, 182, 212, 0.06);
    }

    .text-input-row {
      display: flex;
      gap: 6px;
    }

    .text-input-row input {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      color: #fff;
      font-size: 12px;
      border-radius: 6px;
      outline: none;
    }

    .text-input-row input:focus {
      border-color: rgba(168, 85, 247, 0.45);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.10);
    }

    /* Analyze Screen vision button */
    .analyze-btn {
      position: relative;
      background: linear-gradient(135deg, #06b6d4 0%, #0284c7 100%);
      color: #fff;
      border: none;
      padding: 0 14px;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
      text-transform: uppercase;
    }

    .analyze-btn:hover {
      box-shadow: 0 0 18px rgba(6, 182, 212, 0.55);
      filter: brightness(1.10);
    }

    .analyze-btn.loading {
      background: #475569;
      cursor: default;
    }

    .analyze-canvas-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Translucent click-through overlay mode pointer blocker */
    body.click-through {
      pointer-events: none !important;
    }

    body.click-through .drag-handle-bar,
    body.click-through .setup-panel,
    body.click-through .app-overlay-panel {
      pointer-events: none !important;
    }

    /* Ensure all interactive elements work when NOT in click-through mode */
    body:not(.click-through) .overlay-frame,
    body:not(.click-through) .setup-panel,
    body:not(.click-through) .app-overlay-panel,
    body:not(.click-through) .bottom-bar,
    body:not(.click-through) button,
    body:not(.click-through) input,
    body:not(.click-through) select,
    body:not(.click-through) textarea {
      pointer-events: all !important;
    }

    /* Auto-Listen button states */
    .auto-listen-btn {
      font-size: 11px;
      letter-spacing: 0.02em;
      transition: var(--transition);
    }

    .auto-listen-btn.idle {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      box-shadow: none;
    }

    .auto-listen-btn.idle:hover {
      background: rgba(168, 85, 247, 0.10);
      border-color: rgba(168, 85, 247, 0.32);
      color: var(--accent-violet);
    }

    .auto-listen-btn.active {
      background: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
      color: #fff;
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.45);
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {
      0% {
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.32);
      }

      50% {
        box-shadow: 0 0 22px rgba(74, 222, 128, 0.70);
      }

      100% {
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.32);
      }
    }

    /* Interim speech display strip */
    .interim-speech-bar {
      background: rgba(6, 182, 212, 0.06);
      border: 1px solid rgba(6, 182, 212, 0.20);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--accent-teal);
      font-style: italic;
      min-height: 24px;
      line-height: 1.4;
      word-break: break-word;
      box-shadow: inset 0 0 12px rgba(6, 182, 212, 0.05);
    }

    /* Fallback notification guides */
    .toast-notification {
      display: none;
      position: absolute;
      top: 46px;
      left: 10px;
      right: 10px;
      background: rgba(239, 68, 68, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: white;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.55);
      flex-direction: column;
      gap: 3px;
    }
  </style>
</head>

<body>

  <div class="overlay-frame" id="overlay-frame">
    <!-- Draggable Top Title Bar -->
    <div class="drag-handle-bar">
      <div class="drag-title" id="companion-title">CrazyAnkit.AI</div>
      <div class="status-dot-wrapper">
        <div id="active-indicator" class="status-dot"></div>
        <span id="status-text">Disconnected</span>
      </div>
    </div>

    <!-- Toast Alerts (Error notifications) -->
    <div id="toast-bar" class="toast-notification">
      <b style="font-size: 11.5px;">System Notification</b>
      <span id="toast-text">Details...</span>
    </div>

    <!-- Configuration Setup View (Tabbed Settings Panels) -->
    <div id="setup-panel" class="setup-panel">
      <!-- Tabs selectors -->
      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="tab-standalone">BYOK Mode</button>
        <button class="tab-btn" data-tab="tab-sync">Sync Portal</button>
        <button class="tab-btn" data-tab="tab-prefs">Preferences</button>
      </div>

      <div class="tabs-content">
        <!-- Tab 1: Standalone BYOK Configuration -->
        <div class="tab-pane active" id="tab-standalone">
          <div class="form-group">
            <label class="form-label">Gemini API Key (Google AI Studio)</label>
            <input id="gemini-key-input" type="password" class="input-field" placeholder="AIzaSy..." />
          </div>

          <div class="form-group">
            <label class="form-label">Groq API Key (Optional acceleration)</label>
            <input id="groq-key-input" type="password" class="input-field" placeholder="gsk_..." />
          </div>

          <div class="form-group">
            <label class="form-label">Active Profile Prompt</label>
            <div class="select-wrap">
              <select id="profile-input">
                <option value="coding">Software Coding Challenge</option>
                <option value="hr">HR / Leadership Behavioral</option>
                <option value="interview" selected>General Q&A Interview</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Spoken Language</label>
            <div class="select-wrap">
              <select id="language-input">
                <option value="en-US">English (US)</option>
                <option value="es-ES">Spanish (Spain)</option>
                <option value="fr-FR">French (France)</option>
                <option value="de-DE">German (Germany)</option>
                <option value="zh-CN">Chinese (Simplified)</option>
              </select>
            </div>
          </div>

          <button id="start-standalone-btn" class="btn" style="margin-top: 6px;">Start Direct Session</button>
        </div>

        <!-- Tab 2: SaaS Portal Sync Settings -->
        <div class="tab-pane" id="tab-sync">
          <div class="form-group">
            <label class="form-label">JWT Token (From web dashboard)</label>
            <input id="token-input" type="password" class="input-field" placeholder="Paste your bearer JWT here..." />
          </div>

          <div class="form-group">
            <label class="form-label">Active Session ID</label>
            <input id="session-id-input" type="text" class="input-field" placeholder="Enter session run ID..." />
          </div>

          <button id="connect-sync-btn" class="btn" style="margin-top: 6px;">Establish Sync Connection</button>
        </div>

        <!-- Tab 3: Sliders and opacity layouts preferences -->
        <div class="tab-pane" id="tab-prefs">
          <div class="form-group">
            <label class="form-label">Overlay Opacity: <span id="opacity-label">85%</span></label>
            <input id="opacity-range" type="range" min="0.2" max="1" step="0.05" value="0.85"
              style="accent-color: var(--accent-violet);" />
          </div>

          <label class="checkbox-row">
            <input id="aot-checkbox" type="checkbox" checked />
            Always On Top (Hover over other apps)
          </label>

          <label class="checkbox-row">
            <input id="clickthrough-checkbox" type="checkbox" />
            Transparent Click-Through (Ctrl+M to toggle)
          </label>

          <div class="form-group">
            <label class="form-label">Custom Instruction Prompt Override</label>
            <textarea id="custom-prompt-textarea" class="input-field" rows="3"
              placeholder="Provide extra instructions to follow..." style="resize: none; font-size: 11px;"></textarea>
          </div>

          <button id="save-prefs-btn" class="btn" style="margin-top: 4px; padding: 7px; font-size: 11px;">Save
            Settings</button>
        </div>
      </div>
    </div>

    <!-- Active Mock / Standalone Live Companion Panel -->
    <div id="app-overlay-panel" class="app-overlay-panel">
      <!-- Session details bar -->
      <div class="session-header">
        <button id="back-to-setup-btn" class="back-btn">◂ Setup Mode</button>
        <div id="session-timer-text" class="session-timer">00:00</div>
      </div>

      <!-- Live transcribed speech segment -->
      <div id="transcripts-container" class="transcripts-area">
        <!-- Bubbles injected dynamically -->
      </div>

      <!-- Realtime suggestions card -->
      <div class="ai-result-area">
        <div class="result-section-card">
          <div class="code-header">
            <span class="card-label">✨ Live Response Solution</span>
            <button id="copy-solution-btn" class="copy-btn">Copy</button>
          </div>
          <div id="ai-answer" class="answer-text">Waiting for audio or screen capturing input...</div>
        </div>
      </div>

      <!-- Pagination Footer -->
      <div id="pagination-footer" class="response-pagination" style="display: none;">
        <button id="pag-prev-btn" class="pag-btn" disabled>◂</button>
        <span id="pag-indicator-text" class="pag-indicator">1 of 1</span>
        <button id="pag-next-btn" class="pag-btn" disabled>▸</button>
      </div>

      <!-- Bottom controls capturing bar -->
      <div class="bottom-bar">
        <div class="capture-row">
          <button id="start-audio-btn" class="btn audio-btn idle">Start Capturing</button>
          <button id="toggle-speaker-btn" class="speaker-btn candidate">Speaker: Candidate</button>
        </div>

        <!-- Auto-Listen row: speech-to-text → prompt override injection -->
        <div class="capture-row">
          <button id="auto-listen-btn" class="btn auto-listen-btn idle">🎙 Auto-Listen: OFF</button>
        </div>

        <!-- Live interim speech display (shown while speaking) -->
        <div id="interim-speech-bar" class="interim-speech-bar" style="display:none;">
          <span id="interim-speech-text"></span>
        </div>

        <div class="text-input-row">
          <input id="input-message" type="text" placeholder="Type prompt override..." />
          <button id="send-message-btn" class="btn" style="width: 46px; padding: 0; box-shadow: none;">Send</button>

          <button id="analyze-screen-btn" class="analyze-btn">
            <canvas class="analyze-canvas-overlay" id="wave-canvas"></canvas>
            Vision
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Expose Script Context -->
  <script type="module" src="renderer.js"></script>
</body>

</html>
